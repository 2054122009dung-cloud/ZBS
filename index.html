
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD SIGNAL — A Zombie Survival Story</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg:      #0a0a0b;
  --surface: #111114;
  --border:  #2a2a30;
  --dim:     #3a3a42;
  --muted:   #6b6b78;
  --body:    #c8c8d0;
  --bright:  #e8e8f0;
  --accent:  #c0392b;
  --accent2: #e74c3c;
  --green:   #27ae60;
  --green2:  #2ecc71;
  --amber:   #e67e22;
  --blue:    #2980b9;
  --purple:  #8e44ad;
  --mono:    'Share Tech Mono', monospace;
  --serif:   'Crimson Pro', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--body);
  font-family: var(--serif);
  font-size: 1.1rem;
  line-height: 1.8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  max-width: 760px;
  padding: 2rem 1.5rem 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}

.game-title {
  font-family: var(--mono);
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  letter-spacing: 0.18em;
  color: var(--accent2);
  text-shadow: 0 0 30px rgba(231,76,60,0.4);
  text-transform: uppercase;
}

.game-subtitle {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
}

.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), var(--accent), var(--border), transparent);
  margin: 1.5rem 0 0;
}

#status-bar {
  width: 100%;
  max-width: 760px;
  padding: 0.6rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}

.status-item span { color: var(--dim); margin-right: 0.3rem; }
.status-item.trust  { color: var(--amber); }
.status-item.days   { color: var(--green); }
.status-item.health { color: var(--accent2); }

main {
  width: 100%;
  max-width: 760px;
  padding: 0 1.5rem 4rem;
  flex: 1;
}

#scene-log { min-height: 60px; padding: 1.5rem 0; }

.log-entry {
  margin-bottom: 0.4rem;
  color: var(--muted);
  font-size: 0.82rem;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  opacity: 0.5;
  font-style: italic;
}

#scene-box {
  border-top: 1px solid var(--border);
  padding: 2rem 0;
}

#scene-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

#scene-title {
  font-family: var(--serif);
  font-size: clamp(1.3rem, 3.5vw, 1.9rem);
  font-weight: 600;
  color: var(--bright);
  margin-bottom: 1.2rem;
  line-height: 1.3;
}

#scene-text {
  font-family: var(--serif);
  font-size: 1.08rem;
  line-height: 1.9;
  color: var(--body);
  white-space: pre-line;
}

#scene-text em    { color: var(--amber); font-style: italic; }
#scene-text strong { color: var(--bright); font-weight: 600; }

.twist-callout {
  margin: 1.5rem 0;
  padding: 1rem 1.4rem;
  border-left: 3px solid var(--accent2);
  background: rgba(192,57,43,0.06);
  font-family: var(--mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
  line-height: 1.6;
}

.twist-callout::before {
  content: '⚠ REVELATION ';
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.4rem;
}

/* ── CHOICES ────────────────────────────────────── */
#choices {
  padding: 1.5rem 0 0;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}

.choice-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--body);
  font-family: var(--serif);
  font-size: 1rem;
  padding: 0.9rem 1.2rem;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
  line-height: 1.5;
  position: relative;
}

.choice-btn::before { content: '›  '; font-family: var(--mono); color: var(--muted); transition: color 0.15s; }

.choice-btn:hover {
  border-color: var(--accent);
  background: rgba(192,57,43,0.06);
  color: var(--bright);
  transform: translateX(4px);
}
.choice-btn:hover::before { color: var(--accent); }
.choice-btn:active { transform: translateX(2px); }

/* Combat-trigger choice */
.choice-btn.combat-choice {
  border-color: rgba(192,57,43,0.45);
}
.choice-btn.combat-choice::after {
  content: '⚔ COMBAT';
  position: absolute;
  right: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--accent2);
  border: 1px solid var(--accent2);
  padding: 0.1rem 0.35rem;
  opacity: 0.7;
}
.choice-btn.combat-choice:hover { border-color: var(--accent2); background: rgba(192,57,43,0.1); }

.tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 0.15rem 0.4rem;
  border-radius: 2px;
  letter-spacing: 0.1em;
  vertical-align: middle;
  margin-left: 0.5rem;
}
.tag-trust { background: rgba(230,126,34,0.15); color: var(--amber); border: 1px solid rgba(230,126,34,0.3); }
.tag-risk  { background: rgba(192,57,43,0.12);  color: var(--accent2); border: 1px solid rgba(192,57,43,0.3); }
.tag-safe  { background: rgba(39,174,96,0.12);  color: var(--green);   border: 1px solid rgba(39,174,96,0.3); }

/* ── COMBAT IFRAME OVERLAY ────────────────────── */
#combat-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#combat-overlay.active { display: flex; }

#combat-frame {
  width: 100%;
  max-width: 700px;
  height: 100dvh;
  border: none;
  background: #0a0a0b;
}

/* ── CAPTURE CALLOUT ──────────────────────────── */
.capture-callout {
  margin: 1.5rem 0;
  padding: 1rem 1.4rem;
  border-left: 3px solid var(--purple);
  background: rgba(142,68,173,0.07);
  font-family: var(--mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: #bb8fce;
  line-height: 1.6;
}
.capture-callout::before {
  content: '☠ CAPTURED ';
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.4rem;
}

/* ── ENDINGS ──────────────────────────────────── */
#ending-screen {
  display: none;
  padding: 2rem 0;
  border-top: 1px solid var(--border);
}

.ending-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.ending-badge {
  font-family: var(--mono);
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.3rem 0.8rem;
  border: 1px solid currentColor;
  display: inline-block;
  margin-bottom: 1.5rem;
}

.ending-title {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 600;
  color: var(--bright);
  margin-bottom: 1.2rem;
  line-height: 1.25;
}

.ending-text {
  font-family: var(--serif);
  font-size: 1.08rem;
  line-height: 1.9;
  color: var(--body);
  white-space: pre-line;
  margin-bottom: 2rem;
}

#restart-btn {
  background: none;
  border: 1px solid var(--dim);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  padding: 0.7rem 1.5rem;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
#restart-btn:hover { border-color: var(--body); color: var(--body); }

@media (max-width: 500px) {
  body { font-size: 1rem; }
  #scene-text { font-size: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="game-title">DEAD SIGNAL</div>
  <div class="game-subtitle">A Zombie Survival Story &bull; 5 Endings &bull; Combat Encounters</div>
  <div class="divider"></div>
</header>

<div id="status-bar">
  <div class="status-item days"><span>DAY</span><span id="stat-day">1</span></div>
  <div class="status-item trust"><span>TRUST</span><span id="stat-trust">0</span></div>
  <div class="status-item health"><span>HP</span><span id="stat-health">100</span></div>
  <div class="status-item"><span>CHAPTER</span><span id="stat-chapter">1 / 5</span></div>
</div>

<main>
  <div id="scene-log"></div>

  <div id="scene-box">
    <div id="scene-label"></div>
    <div id="scene-title"></div>
    <div id="scene-text"></div>
    <div id="choices"></div>
  </div>

  <div id="ending-screen">
    <div class="ending-label">ENDING REACHED</div>
    <div id="ending-badge" class="ending-badge"></div>
    <div id="ending-title" class="ending-title"></div>
    <div id="ending-text" class="ending-text"></div>
    <button id="restart-btn" onclick="startGame()">↺  PLAY AGAIN</button>
  </div>
</main>

<!-- COMBAT OVERLAY (iframe) -->
<div id="combat-overlay">
  <iframe id="combat-frame" src="" title="Combat"></iframe>
</div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let state = {
  day: 1, trust: 0, health: 100, chapter: 1,
  flags: {},
  pendingCombatWin: null,
  pendingCombatLose: null,
};

/* ═══════════════════════════════════════════════════
   SCENES
═══════════════════════════════════════════════════ */
const scenes = {

  /* ═══════════ CHAPTER 1 ═══════════ */

  'intro': {
    chapter: 1, label: 'CHAPTER 1 — THE SIGNAL',
    title: 'Day One. You Wake Up Alone.',
    text: `The basement smells like copper and damp concrete. You remember driving to your sister's apartment last night — the roads were wrong, the lights were wrong, someone was <em>eating someone</em> on the overpass.

You don't remember getting here.

A hand-crank radio crackles on the shelf. Through the static, fragments: <em>"...survivors at Mercy General... Military cordon at Route 9... Do NOT trust anyone who has been bitten and claims recovery..."</em>

The signal dies. On the floor, a note in your own handwriting — you don't remember writing it:

<strong>"DON'T GO UPSTAIRS. DON'T OPEN THE RED DOOR. FIND MARCUS."</strong>

Footsteps above. Heavy, dragging. Then a wet impact against the ceiling. Then silence.`,
    choices: [
      { text: 'Force the basement door — clear whatever is up there', combat: true, encounter: 'horde', win: 'ch1_upstairs_clear', lose: 'ch1_captured_basement', tag: 'risk' },
      { text: 'Ignore it — follow the note. Find Marcus.', next: 'ch1_find_marcus', flag: 'followed_note', tag: 'safe' },
      { text: 'Crank the radio and try to respond to the signal', next: 'ch1_radio' },
    ]
  },

  'ch1_upstairs_clear': {
    chapter: 1, label: 'CHAPTER 1 — THE SIGNAL',
    title: 'The Red Door',
    text: `You clear the floor, heart hammering, hands slick with things you try not to name. The red door — painted in a hurry, still tacky — stands at the end of the hall. It opens before you touch it.

A woman falls through, gasping, alive. <strong>Yara</strong>. Dried blood on her hands — not hers, from the way she holds them away from herself. Eyes wild but intelligent.

<strong>"Thank god. Are you the one leaving notes? I found a dozen in the neighborhood. All the same handwriting."</strong>

You have no memory of writing a single one. She says she's a nurse. Says she had "the shot" — a trial vaccine — before the outbreak. Then she shows you her forearm.

<div class="twist-callout">A bite mark. Weeks old, faded to scar. She's alive, lucid, walking. Either she's immune — or the incubation period is longer than anyone thought. Either answer is terrifying.</div>`,
    choices: [
      { text: 'Trust her. The vaccine makes sense.', next: 'ch2_with_yara_trusted', trust: 2, flag: 'trust_yara', tag: 'trust' },
      { text: 'Travel together — but watch her closely', next: 'ch2_with_yara_cautious', flag: 'watch_yara' },
      { text: 'Lock her out. You didn\'t survive to die from charity.', next: 'ch2_alone_after_yara', trust: -2, flag: 'rejected_yara', tag: 'risk' },
    ]
  },

  'ch1_captured_basement': {
    chapter: 1, label: 'CHAPTER 1 — THE SIGNAL',
    title: 'Taken',
    text: `The horde takes you before you reach the top stair. You wake on a cot in a stranger's house — someone dragged you clear and bandaged your arm. The woman sitting across from you introduces herself as <strong>Yara</strong>. She pulled you out.

<strong>"You were screaming something. About Marcus. Who's Marcus?"</strong>

You don't know. The note is gone — torn from your pocket — but the name stays, burned into something deeper than memory.

Yara says she knows the name. Her expression says knowing it costs something.`,
    choices: [
      { text: '"Tell me everything you know about Marcus."', next: 'ch1_find_marcus', trust: 1, flag: 'yara_rescued_you' },
      { text: 'Say nothing. Take her supplies and move.', next: 'ch2_alone_after_yara', trust: -1, health: 15 },
    ]
  },

  'ch1_find_marcus': {
    chapter: 1, label: 'CHAPTER 1 — THE SIGNAL',
    title: 'The Name in the Note',
    text: `A map under the radio. A route marked in red ink — Kowalski Storage, Unit 7, three blocks east. The name "Marcus" circled at the destination.

You don't know anyone named Marcus.

At the warehouse, the unit is unlocked. Inside: a camp light, supplies, a man in his fifties with a soldier's posture and a preacher's patience. He looks at you like he expected you.

<strong>"Took you long enough. You really don't remember me?"</strong>

He knows your name. Your sister's name. He says you met at the hospital the night it started. You have no memory of any hospital. He hands you a photograph — you and him, standing in a parking garage, smiling. Dated three weeks ago.

<strong>The outbreak started ten days ago.</strong>

<div class="twist-callout">Three weeks ago — before the outbreak — you apparently knew this man. Someone erased that knowledge from you. Someone who had access to your mind.</div>`,
    choices: [
      { text: '"How do you have a photo of me from before any of this?"', next: 'ch2_marcus_truth', trust: 1, flag: 'questioned_marcus' },
      { text: 'Accept it. Whatever happened, Marcus is your only lead.', next: 'ch2_marcus_ally', trust: 2, flag: 'trust_marcus', tag: 'safe' },
      { text: 'This is a trap. Run.', next: 'ch2_alone_no_marcus', trust: -1, health: -10, flag: 'fled_marcus', tag: 'risk' },
    ]
  },

  'ch1_radio': {
    chapter: 1, label: 'CHAPTER 1 — THE SIGNAL',
    title: 'Static and Something Worse',
    text: `Twenty minutes of cranking and tuning — then a frequency that shouldn't be there. Clear as glass: a man's voice, calm, professional, reading GPS coordinates followed by names. A roll call.

Your name is on it.

This isn't a rescue broadcast. It's a <em>catalog</em>. Someone is tracking survivors — and they knew your name before you gave it.

A notebook behind the radio: a phone number, and one word: <strong>MARCUS.</strong>

You step outside. A woman nearly runs into you — <strong>Yara</strong>, breathless, grabbing your arm.

<strong>"Did you hear it? Don't go to those coordinates. That's not rescue."</strong>

<div class="twist-callout">She knows what the broadcast means without you explaining it. She's been listening for longer than she's letting on — or she already knows what it is because she helped build it.</div>`,
    choices: [
      { text: '"How do you know what the broadcast means?"', next: 'ch2_yara_radio_truth', trust: 1, flag: 'questioned_yara_radio' },
      { text: 'Head to the coordinates anyway — answers are worth the risk', next: 'ch2_coordinates', health: -10, flag: 'went_to_coordinates', tag: 'risk' },
      { text: 'Trust Yara. Find Marcus first.', next: 'ch2_with_yara_trusted', trust: 2, flag: 'trust_yara', tag: 'trust' },
    ]
  },

  /* ═══════════ CHAPTER 2 ═══════════ */

  'ch2_with_yara_trusted': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Safe Harbor',
    text: `Yara leads you to the Colony — a school gymnasium on the edge of town, barricaded, humming with forty survivors. A garden in the parking lot. Children. It feels almost like hope.

The Colony's leader, <strong>Briggs</strong>, runs things with the organized chaos of someone who's done logistics in worse situations. You earn your place through two days of supply runs.

On the route back from the third run, you find the road to the gymnasium blocked.

A knot of infected — a dozen at least — has piled against a car wreck across the only safe path. Slow, yes. But the noise will draw more.

There is a side alley that might be clear. And there is the direct route, through them.`,
    choices: [
      { text: 'Push through the infected — get back to the Colony fast', combat: true, encounter: 'horde', win: 'ch2_colony_arrived', lose: 'ch2_horde_captured', tag: 'risk' },
      { text: 'Take the alley — slower but quieter', next: 'ch2_colony_arrived', health: -5, tag: 'safe' },
      { text: 'Double back and warn the Colony by radio', next: 'ch2_colony_arrived', trust: 1 },
    ]
  },

  'ch2_colony_arrived': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'What Yara Found',
    text: `You make it back. The Colony is intact. Briggs nods at you like that's the highest praise you'll ever receive.

On day three, Yara pulls you aside. The warmth in her face has changed to something harder.

<strong>"I need to tell you something about Marcus. About what really happened the night the outbreak started."</strong>

She opens a folder. Medical documents. Your name. A drug trial you apparently consented to — six weeks ago.

<strong>"You weren't just a subject. You were enrolled as a <em>vector</em>."</strong>

<div class="twist-callout">The drug wasn't a vaccine. It was a slow-release biological agent designed to survive in an asymptomatically infected host and spread at close contact. The outbreak didn't begin at the hospital. The outbreak began with you — in a grocery store, on a bus, in the streets of this city. Every person who died passed through the radius of your breath.</div>`,
    choices: [
      { text: '"Why are you telling me this now?"', next: 'ch3_yara_confrontation', flag: 'confronted_yara' },
      { text: 'Ask to see Marcus. He signed you up for the trial.', next: 'ch3_find_marcus_angry', trust: -1, flag: 'want_marcus' },
      { text: 'Tell Briggs and the Colony. They deserve the truth.', next: 'ch3_told_colony', trust: -2, health: -20, flag: 'told_colony', tag: 'risk' },
    ]
  },

  'ch2_horde_captured': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Pulled Under',
    text: `The horde takes you at the wreck. You wake in a Vantara holding room — white walls, generator hum, the smell of antiseptic. Someone pulled you out of the mass before it finished the job.

That someone is a woman in a lab coat: <strong>Dr. Lena Holt</strong>. She smiles with professional warmth.

<strong>"You're very lucky we were in the area. This is a Vantara recovery station — you're safe now."</strong>

You notice the door is locked from the outside.

<div class="capture-callout">You're not rescued. You're collected. The horde was loose near a Vantara patrol route, and they've been sweeping the area for a specific kind of survivor. They've been looking for you specifically — they just didn't know you'd walk into their arms.</div>`,
    choices: [
      { text: 'Play along. Gather information.', next: 'ch3_play_along', flag: 'playing_dumb', flag2: 'vantara_captured', tag: 'safe' },
      { text: 'Demand to know what Vantara is', next: 'ch3_vantara_captive_resist', flag: 'vantara_captured' },
    ]
  },

  'ch2_with_yara_cautious': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Uneasy Alliance',
    text: `You travel together — Yara two steps ahead, you watching her hands. She navigates the dead city with uncanny precision. She knows this neighborhood like someone who mapped it deliberately.

You reach the Colony. Yara is welcomed like a returning member. You're a stranger under Briggs's flat assessment.

The route from your assigned supply sector to the Colony passes through a block that the dead have claimed completely. On day two, a Vantara operative steps out of a doorway ahead — hazmat-adjacent gear, tablet in hand, tranq rifle on their back. They haven't seen you yet.

<strong>They're between you and home.</strong>`,
    choices: [
      { text: 'Neutralize the operative before they call it in', combat: true, encounter: 'vantara', win: 'ch2_operative_down', lose: 'ch2_operative_captured', tag: 'risk' },
      { text: 'Backtrack and find another route', next: 'ch2_operative_bypassed', health: -5 },
      { text: 'Let Yara handle it — she might know them', next: 'ch2_operative_bypassed', trust: 1, flag: 'yara_handled_operative' },
    ]
  },

  'ch2_operative_down': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Keycard',
    text: `The operative goes down. Their radio crackles with a check-in call they won't answer.

In their jacket: a red-trimmed keycard. Vantara logo. And a dossier — a single page, your photograph at the top, your name below it, and a status field that reads:

<em>SUBJECT ZERO — COLLECTION PRIORITY: CRITICAL</em>

Yara reads over your shoulder and says nothing for a long moment.

<strong>"They know exactly who you are. They've known since before the outbreak started."</strong>

She takes the keycard from you — carefully, like it matters more than the dead operative at your feet.`,
    choices: [
      { text: '"What do they want with me, Yara? The full truth."', next: 'ch2_colony_arrived', trust: 1, flag: 'confronted_yara' },
      { text: 'Pocket the keycard and keep moving. Talk later.', next: 'ch2_colony_arrived', flag: 'has_keycard' },
    ]
  },

  'ch2_operative_captured': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Processed',
    text: `The tranq round finds your neck. You wake in a Vantara station — cot, locked door, antiseptic smell. Dr. Holt introduces herself with practiced warmth.

<div class="capture-callout">Captured by Vantara before you even understand what Vantara is. They have your blood type, your name, a photograph that predates the outbreak. They've been waiting for you to surface.</div>`,
    choices: [
      { text: 'Play along. Learn what you can.', next: 'ch3_play_along', flag: 'playing_dumb', tag: 'safe' },
      { text: 'Refuse to cooperate with anything', next: 'ch3_vantara_captive_resist' },
    ]
  },

  'ch2_operative_bypassed': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Night Three',
    text: `You make it back. But on night three, you follow Yara.

She meets with a man you've never seen — gray suit, completely out of place in the apocalypse. He hands her an envelope. She says:

<strong>"The subject is stable. Memory loss holding. Ready for Phase Two."</strong>

<div class="twist-callout">"The subject" is you. Your memory loss wasn't caused by trauma from the outbreak. It was chemically induced beforehand. You have been someone's ongoing experiment since before any of this began.</div>`,
    choices: [
      { text: 'Confront them both right now', next: 'ch3_confront_both', trust: -1, health: -15, flag: 'confronted_both', tag: 'risk' },
      { text: 'Back off and follow the gray-suited man', next: 'ch3_follow_gray_man', flag: 'followed_gray_man' },
      { text: 'Say nothing. Let them think you don\'t know.', next: 'ch3_play_along', trust: 1, flag: 'playing_dumb', tag: 'safe' },
    ]
  },

  'ch2_alone_after_yara': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Alone is Honest',
    text: `You go alone. Harder than expected — the dead have spread faster than any report suggested. You learn to move at dusk when they're slower. You learn which sounds mean nothing and which mean run.

On day two you find an overrun camp. Everyone dead except one: a child, nine years old, hiding under a truck. His name is <strong>Emil</strong>. He watches you until you show him you're not scared.

You're scared. You show him anyway.

The road forward passes through what Emil calls "the pharmacy block" — a long commercial strip now thick with the dead. He says there's a way through, but it's tight. He's scouted it four times.

<strong>"I'll guide you. But you have to stay close and stay quiet."</strong>`,
    choices: [
      { text: 'Follow Emil\'s route through the pharmacy block', combat: true, encounter: 'crawler', win: 'ch2_alone_survived_crawler', lose: 'ch2_alone_crawler_down', tag: 'risk' },
      { text: 'Take the long way around — add two hours, save the risk', next: 'ch2_alone_survived_crawler', health: -8, tag: 'safe' },
    ]
  },

  'ch2_alone_survived_crawler': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'What Emil Knows',
    text: `You clear the block. Emil watches the exit route while you breathe.

He's been alone four days and he's been <em>watching</em> — memorizing the city the way children memorize things that matter to them. He tells you about a man in a gray suit who came through yesterday, leading a group of "volunteers" toward the old hospital.

<strong>"He said he could cure them. But they didn't look sick when they followed him. They looked... empty."</strong>

<div class="twist-callout">The hospital was where the outbreak was formally declared. And the gray suit description pulls at something in your missing memory — a shape, a voice, a room with fluorescent lights. You've seen this person before. Somewhere important. Before.</div>`,
    choices: [
      { text: 'Take Emil to the Colony — he\'ll be safer there', next: 'ch3_colony_with_emil', trust: 2, flag: 'has_emil', tag: 'safe' },
      { text: 'Follow the gray-suited man to the hospital', next: 'ch3_follow_gray_man', health: -10, flag: 'followed_gray_man', tag: 'risk' },
      { text: 'Find Marcus first. He\'s the only thread left.', next: 'ch3_find_marcus_angry', flag: 'want_marcus' },
    ]
  },

  'ch2_alone_crawler_down': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Eight Limbs',
    text: `The thing pins you. Emil does something remarkable: throws a bottle against the far wall, and the sound gives you a half-second while it turns.

Half a second is enough.

You come out the other side damaged but moving. Emil holds your hand while you catch your breath. He's seen worse, evidently. He doesn't say so — he just waits.

<div class="capture-callout">You didn't pass out — but you're hurt and you lost your supplies in the scramble. You have the boy and the road ahead and whatever you can carry. Which is less than before.</div>`,
    choices: [
      { text: 'Keep moving. Find shelter and regroup.', next: 'ch2_alone_survived_crawler', health: -20, flag: 'has_emil' },
    ]
  },

  'ch2_marcus_truth': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'What Marcus Knows',
    text: `Marcus sits with the photograph between you like evidence.

<strong>"I'm not your enemy. I'm the reason you're still alive."</strong>

He worked for a biotech firm — <strong>Vantara Solutions</strong>. Twelve weeks ago, a field test of a neurological compound went wrong. Catastrophically wrong. Vantara's cover story was a flu strain. Their cleanup protocol <em>became</em> the outbreak.

You were one of three Vantara employees who discovered this. The other two are dead. You're alive because Marcus found you first — sedated you, induced memory loss, hid you in the basement before Vantara's asset hunters arrived.

<strong>"The notes were a dead man's switch. In case I didn't reach you in time."</strong>

On the route back from the warehouse, Vantara's people are already moving through the streets. Three operatives in hazmat gear, scanning doors. Professional. Patient.

<strong>They'll find the warehouse in twenty minutes.</strong>`,
    choices: [
      { text: 'Fight through the operatives to escape the block', combat: true, encounter: 'squad', win: 'ch2_marcus_escaped', lose: 'ch2_marcus_squad_captured', tag: 'risk' },
      { text: 'Hide in the warehouse until they pass', next: 'ch2_marcus_escaped', health: -10, tag: 'safe' },
      { text: 'Use Marcus\'s knowledge to bluff through their checkpoint', next: 'ch2_marcus_escaped', trust: 1, flag: 'trust_marcus' },
    ]
  },

  'ch2_marcus_escaped': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'What Was Left Behind',
    text: `You clear the block — or avoid it. The warehouse is behind you.

Marcus leads you through back routes to a secondary cache. While he works the lock, you notice the bag he carries everywhere. He sets it down carelessly. The zipper is open.

Inside: documents. Technical files, dense with jargon. At the bottom, a personnel file.

<em>Marcus Arthur Voss. Vantara Solutions, Research Division. Lead Investigator: neurological compound trials. Subject selection criteria: immune profile, proximity, vulnerability index—</em>

He chose you. Not to save you. To enroll you.

<div class="twist-callout">Marcus didn't select you to protect you. He selected you as a trial subject because your immune profile matched the compound's requirements. Saving you was guilt — not the original plan.</div>`,
    choices: [
      { text: 'Confront him with what you found', next: 'ch3_read_marcus_files', flag: 'read_marcus_bag' },
      { text: 'Say nothing. He\'s useful and you need him functional.', next: 'ch2_marcus_ally', flag: 'trust_marcus' },
    ]
  },

  'ch2_marcus_squad_captured': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'The Collection',
    text: `The squad takes you both. Professional, efficient, no unnecessary force. You wake in separate rooms.

<div class="capture-callout">Vantara has you and Marcus. This is not a prison — it's a collection point. The difference matters: a prison keeps you contained. A collection point processes you.</div>`,
    choices: [
      { text: 'Find a way to reach Marcus before processing begins', next: 'ch3_vantara_captive_resist', flag: 'vantara_captured' },
      { text: 'Cooperate and look for openings from the inside', next: 'ch3_play_along', flag: 'playing_dumb', tag: 'safe' },
    ]
  },

  'ch2_marcus_ally': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Two Against Everything',
    text: `You work together. Marcus teaches you what he knows: how to read infected movement patterns, how to move invisibly, how to survive at a level below attention.

On day three, Yara appears at the warehouse. She and Marcus know each other. The look between them is not warm.

<strong>Marcus:</strong> "You weren't supposed to make contact yet."
<strong>Yara:</strong> "The timeline changed. Vantara is moving the collection. Seventy-two hours."

They both look at you the way you've learned means you're the point, not the audience.

<div class="twist-callout">You are not a survivor who got lucky. You are the only living person who carries both the pathogen and a fully developed antibody simultaneously. You are the end of the world — and the only possible cure for it. Marcus and Yara represent competing organizations who each want something different from your blood.</div>`,
    choices: [
      { text: 'Side with Marcus — contain it, make it public', next: 'ch3_side_marcus', trust: 1, flag: 'sided_marcus' },
      { text: 'Hear Yara\'s side first', next: 'ch3_yara_confrontation', flag: 'confronted_yara' },
      { text: 'Refuse to be anyone\'s asset. Walk away from both.', next: 'ch3_walk_away_both', trust: -2, flag: 'refused_both', tag: 'risk' },
    ]
  },

  'ch2_alone_no_marcus': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Running Blind',
    text: `You run hard. Four blocks, five — until your lungs give out in a gas station bathroom.

You survive on vending machine food for two days. On day two, a dead journalist. Recent. Clean — no bite marks. Their notebook, jacket pocket, is full of shorthand:

Vantara Solutions. Colony subjects. Something called <strong>Protocol Lazarus.</strong>

One entry is clear:

<em>"Subject Zero doesn't know. They never told Subject Zero what they really are."</em>

Dated the day the outbreak began. <strong>Your name is the entry.</strong>

The road from the gas station to anywhere is a long commercial block — and it's full. Not one or two. A proper horde, slow and thick.

You can't go around. The side roads are flooded.`,
    choices: [
      { text: 'Fight through — the notebook changes everything', combat: true, encounter: 'horde', win: 'ch2_notebook_survived', lose: 'ch2_notebook_captured', tag: 'risk' },
      { text: 'Wait them out. Hours, if necessary.', next: 'ch2_notebook_survived', health: -5, tag: 'safe' },
    ]
  },

  'ch2_notebook_survived': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Subject Zero',
    text: `You reach the other side. The notebook is still in your jacket.

<div class="twist-callout">Subject Zero. You are the origin point of the outbreak — not because someone chose you maliciously, but because someone chose you as a trial subject and something went very wrong. The question is whether you were chosen carelessly, experimentally, or deliberately. The journalist seemed to know. The journalist is dead.</div>

You find the Colony by accident — a survivor's runner spots you and brings you in. Briggs looks you over.

<strong>"You look like you've been through something. We can talk about what when you've eaten."</strong>`,
    choices: [
      { text: 'Find Marcus — his name is in the notebook', next: 'ch3_find_marcus_angry', flag: 'has_notebook', trust: -1 },
      { text: 'Tell the Colony what you know', next: 'ch3_told_colony', trust: -1, flag: 'told_colony', tag: 'risk' },
      { text: 'Go to the hospital alone. No allies. No trust.', next: 'ch3_walk_away_both', trust: -2, flag: 'refused_both', tag: 'risk' },
    ]
  },

  'ch2_notebook_captured': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Fallen',
    text: `The horde takes you at the underpass. You come back to consciousness in a clean room. Vantara. Dr. Holt is there.

The notebook is gone.

<div class="capture-callout">Captured twice now — or captured for the first time, properly. The notebook is gone. What you read is not. Vantara took you before you could use the information, but they can't take what's already in your head.</div>`,
    choices: [
      { text: 'Play the patient survivor until an opening appears', next: 'ch3_play_along', flag: 'playing_dumb', tag: 'safe' },
      { text: 'Demand to speak to Marcus', next: 'ch3_vantara_captive_resist', flag: 'vantara_captured' },
    ]
  },

  'ch2_coordinates': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Into the Lion\'s Mouth',
    text: `The coordinates lead to the civic center — swept clean, powered, staffed by people in hazmat-adjacent gear. Not soldiers. Analysts.

Dr. Lena Holt introduces herself. She knows your name before you give it. She offers food, a bed, safety — with the ease of someone who knows you'll take it.

You almost do. Until you see the processing line: survivors, moving through intake, walking out the other end with their lights turned down. Alive. Present. Just... managed.

<strong>Holt notices you noticing.</strong>

<strong>"The adjustment period is temporary. Completely healthy."</strong>

A man in line turns and looks at you. His eyes are present but absent — like someone left the house running with no one home.

The corridor to the right leads deeper into the facility. The door is unlocked — they don't expect anyone to want to go that direction.`,
    choices: [
      { text: 'Go deeper — find out what processing actually does', next: 'ch3_play_along', flag: 'playing_dumb', tag: 'safe' },
      { text: 'Fight your way out right now', combat: true, encounter: 'squad', win: 'ch3_escaped_vantara', lose: 'ch3_play_along', tag: 'risk' },
      { text: 'Pretend to comply while finding a way to warn others', next: 'ch3_play_along', trust: 1, flag: 'playing_dumb' },
    ]
  },

  'ch2_yara_radio_truth': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'What Yara Confesses',
    text: `Yara sits with you on the steps of an abandoned deli.

She was a field nurse for Vantara — hired to monitor trial subjects. She monitored you. Six weeks of vitals, responses, reactions. She liked you. That's why she ran when the collection order came.

<strong>"They weren't going to treat you. They were going to harvest the antibodies. The process is not survivable."</strong>

The street behind you is clear. The street ahead is not.

A bloated shape blocks the intersection — something that used to be a very large man, distended now, pulsing with whatever the compound did to its biology over weeks. It's between you and anywhere useful.`,
    choices: [
      { text: 'Fight through the Bloater together', combat: true, encounter: 'bloater', win: 'ch2_bloater_survived', lose: 'ch2_bloater_captured', tag: 'risk' },
      { text: 'Find a way around — you need Yara functional, not heroic', next: 'ch2_bloater_survived', health: -12, tag: 'safe' },
    ]
  },

  'ch2_bloater_survived': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'After',
    text: `You reach safety. Yara is shaken — not from the fight, from what she saw it do to something that was human.

<strong>"The compound accelerates certain cellular processes. In most people it's fatal within days. In very few — people like you — it produces something the immune system eventually overcomes. What you just saw is what happens to the ones in the middle."</strong>

<div class="twist-callout">You filed a report on yourself. Yara is still not saying the whole truth — she's omitting that she filed the monitoring report that put your name on Vantara's collection list. Guilt and betrayal are not mutually exclusive.</div>`,
    choices: [
      { text: '"You put my name on their list."', next: 'ch3_yara_confrontation', trust: -1, flag: 'confronted_yara' },
      { text: 'Forgive her. She\'s trying to fix it.', next: 'ch3_marcus_partner', trust: 2, flag: 'forgave_yara', tag: 'trust' },
      { text: 'Leave her. Find Marcus alone.', next: 'ch3_find_marcus_angry', flag: 'want_marcus' },
    ]
  },

  'ch2_bloater_captured': {
    chapter: 2, label: 'CHAPTER 2 — THE COLONY',
    title: 'Acid and Dark',
    text: `The Bloater ruptures. You're conscious long enough to see Yara pull you clear, then the darkness takes you.

Vantara arrives before you wake. Yara is gone when you open your eyes. Dr. Holt is there instead.

<div class="capture-callout">Whether Yara sold you to Vantara or just couldn't stop them, you don't know. The result is the same. You're in a clean room. The door is locked. And your blood — your very specific, very valuable blood — is the reason you're still alive instead of processed and discarded.</div>`,
    choices: [
      { text: 'Play cooperative. Find the angle.', next: 'ch3_play_along', flag: 'playing_dumb', tag: 'safe' },
      { text: 'Make noise. Demand Marcus.', next: 'ch3_vantara_captive_resist', flag: 'vantara_captured' },
    ]
  },

  /* ═══════════ CHAPTER 3 ═══════════ */

  'ch3_yara_confrontation': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'What She Really Did',
    text: `Yara doesn't deny it.

<strong>"Yes. I filed the report. If I hadn't, they'd know I was covering you, and I'd be on the list too. I chose me. I've hated myself for it every day since."</strong>

She tells you what you actually need: Protocol Lazarus is Vantara's endgame. A biological cure — not synthesized, living in the immune system of the one person who survived full exposure to both pathogen strains. You.

The old hospital across the river is where they're staging the final collection. Marcus is already inside — taken two days ago. Yara has a Vantara access badge that will get you to Room 4B.

She holds it out.

<strong>"Whatever you decide about me after — this is yours."</strong>

The bridge to the hospital is not unguarded. Vantara has a checkpoint. And something has been killing people at that checkpoint — something that moves too fast for standard infected.`,
    choices: [
      { text: 'Fight through the checkpoint', combat: true, encounter: 'vantara', win: 'ch4_hospital_entry', lose: 'ch4_captured_entry', tag: 'risk' },
      { text: 'Use the badge — walk through legitimately', next: 'ch4_hospital_entry', trust: 1, flag: 'yara_with_you', tag: 'safe' },
      { text: 'Find a way under the bridge', next: 'ch4_hospital_entry', health: -15, flag: 'breached_hospital' },
    ]
  },

  'ch3_find_marcus_angry': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'The Empty Warehouse',
    text: `The warehouse is empty. Marcus gone. The camp light still warm, a mug steaming, boot prints on the floor — two sets — and a smear of blood too small to be a wound. A professional removal.

On the table, one thing left deliberately: a keycard. Red trim, Vantara logo. Marcus's handwriting on the back:

<em>"Come anyway. Room 4B. You need to see what they built with your blood. —M"</em>

He knew they were coming. He planned for it.

Outside the warehouse, the street to the hospital runs through a stretch that's been abandoned even by the dead — which means something else has claimed it. You hear it before you see it: a low, continuous clicking, like a geiger counter made of bone.

The <strong>Crawler</strong> drops from the fire escape above.`,
    choices: [
      { text: 'Fight the Crawler — you have no other route', combat: true, encounter: 'crawler', win: 'ch4_hospital_entry', lose: 'ch4_captured_entry', tag: 'risk' },
      { text: 'Retreat and find another path to the hospital', next: 'ch4_hospital_entry', health: -20, tag: 'safe' },
    ]
  },

  'ch3_told_colony': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'The Weight of Truth',
    text: `You tell them. All of it. In the gymnasium, dinner half-eaten, forty pairs of eyes.

The silence that follows is the worst thing you've heard since the outbreak.

Three people leave that night. Two were people you liked. By morning, something fragile has broken. Children are kept across the room from you.

Briggs finds you at dawn with a plan — not gentle, but real:

<strong>"If your blood ends this, we get you to a real lab. University of Northern went dark early. Their work might still be there."</strong>

He's already confirmed it on radio. He doesn't mention who confirmed it. On the road to the university, Vantara's squad has the main route sealed. The only way through is through them.`,
    choices: [
      { text: 'The Colony fights through together', combat: true, encounter: 'squad', win: 'ch4_hospital_entry', lose: 'ch4_captured_entry', flag: 'colony_backup', tag: 'risk' },
      { text: 'Take a longer route — you\'ve cost them enough', next: 'ch4_hospital_entry', health: -15, flag: 'colony_backup', tag: 'safe' },
    ]
  },

  'ch3_confront_both': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'Caught and Cornered',
    text: `You step from the shadows. The gray-suited man reaches for his jacket. Yara moves between you, fast.

<strong>"Don't."</strong> Not to you. To him.

He freezes. Whatever authority Yara's demonstrated, it ranks him.

The gray-suited man — Dr. Holt's superior, the architect of Vantara's collection program — speaks with the flat tone of someone reading terms and conditions:

<strong>"Cooperate, and you'll be comfortable for the rest of a short, painless life. Resist, and the same outcome becomes less comfortable."</strong>

Behind him, at the end of the alley, a Bloater has drifted in from the side street. It hasn't noticed any of you yet. The gray man's back is to it.`,
    choices: [
      { text: 'Use the Bloater as a distraction — trigger it and run', combat: true, encounter: 'bloater', win: 'ch4_hospital_entry', lose: 'ch3_play_along', tag: 'risk' },
      { text: 'Let Yara negotiate — you need information more than escape', next: 'ch4_hospital_entry', trust: 1, flag: 'yara_with_you' },
      { text: 'Agree to go with them. Use the access.', next: 'ch4_hospital_entry', flag: 'playing_dumb', tag: 'safe' },
    ]
  },

  'ch3_follow_gray_man': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'The Man the Dead Ignore',
    text: `Six blocks. Not a single infected comes near him. They look at him and look away — he doesn't register as prey. A different compound in his system. Not immune: <em>invisible.</em>

You follow him into the hospital through a loading dock. Inside: a functioning laboratory, Vantara uniforms, rows of beds. People in them — breathing, eyes open, nobody home.

Room 4B: shouting on the other side. Marcus's voice.

You listen at the door. He's arguing with Dr. Holt about <em>consent.</em> She says the form you signed was legally adequate. He says you didn't understand what you were signing. They've had this argument many times. It sounds like guilt wearing a business dispute's clothing.

Before you can decide what to do, the Crawler from the pharmacy block drops through a ceiling tile above you. It came in through the ventilation. It's been following your heat.`,
    choices: [
      { text: 'Fight the Crawler in the corridor', combat: true, encounter: 'crawler', win: 'ch4_hospital_entry', lose: 'ch4_captured_entry', tag: 'risk' },
      { text: 'Open Room 4B\'s door — let the confusion be your cover', next: 'ch4_hospital_entry', flag: 'dramatic_entrance' },
    ]
  },

  'ch3_play_along': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'The Performance',
    text: `You play dumb. You let them think the memory loss is total.

It works for forty-eight hours.

During those hours you learn: the layout of Vantara's operation, the names of the people running it, the location of the synthesis lab — Room 4B — and where Marcus is held. You also learn something nobody told you:

The cure, once synthesized from your antibodies, can be mass-produced. Distributed. The extraction is dangerous but not fatal.

Vantara's plan is to control distribution — to rebuild society on their terms, with leverage over every government that needs the cure.

On hour forty-nine, an alarm. Not for you — something has gotten into the building. The lights flicker. From somewhere below comes the wet clicking of the Crawler. It followed the heat signatures through the service tunnels.

The guards leave their posts.

<strong>Your window is now.</strong>`,
    choices: [
      { text: 'Move while the alarm covers you — go to Room 4B', next: 'ch4_hospital_entry', flag: 'has_plan', tag: 'safe' },
      { text: 'Find Marcus\'s cell first', next: 'ch4_hospital_entry', trust: 1, flag: 'trust_marcus_full' },
    ]
  },

  'ch3_vantara_captive_resist': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'What Resistance Costs',
    text: `You make noise. You demand. Dr. Holt listens with the patience of someone who has more time than you do and knows it.

Then she says something unexpected: <strong>"Ask for Marcus by name one more time and I'll tell you something about him that will make you wish you hadn't."</strong>

She's not threatening you. She's warning you. There's a difference, and she seems to know you'll hear it.

A guard brings you to a conference room. A file is on the table. Your name is at the top. But the rows below your name — the previous trial subjects, their outcomes — are what she wants you to see.

Forty-seven names. Forty-six with the status: DECEASED.

Yours: ACTIVE.

<div class="twist-callout">You are not a lucky survivor. You are the only survivor. Whatever makes your biology different from forty-six other people who received the same compound — that difference is why Vantara needs you. And why they'll do anything to keep you alive long enough to extract it.</div>`,
    choices: [
      { text: 'Use this knowledge to negotiate from inside', next: 'ch4_hospital_entry', trust: 1, flag: 'playing_dumb' },
      { text: 'Find a weapon and fight out', combat: true, encounter: 'squad', win: 'ch4_hospital_entry', lose: 'ch4_hospital_entry', flag: 'breached_hospital', tag: 'risk' },
    ]
  },

  'ch3_escaped_vantara': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'Outside',
    text: `You're out. The civic center is behind you, lit and humming with people who don't know they're losing something.

You surface on the far side of the hospital block — the city moving you, the way cities sometimes do when you stop fighting the current.

A note taped to a stop sign at eye level, in Marcus's handwriting:

<em>"When you're ready: south dock. I'll be watching. —M"</em>`,
    choices: [
      { text: 'Go to the south dock', next: 'ch4_hospital_entry', flag: 'trust_marcus_full', tag: 'safe' },
      { text: 'Circle the building first — know what you\'re walking into', next: 'ch4_hospital_entry', flag: 'has_plan' },
    ]
  },

  'ch3_walk_away_both': {
    chapter: 3, label: 'CHAPTER 3 — THE HOSPITAL',
    title: 'Subject Zero Goes Alone',
    text: `You walk away from both of them. Vantara notices after six hours. Marcus after two. Your head start is the dead journalist's notebook, Yara's fragments, and enough anger to keep moving.

You watch the hospital for a full day. Learn the patterns. The weak points. The rhythm of the shifts.

On day three, in your jacket pocket: a keycard you didn't put there. Marcus's handwriting on a note inside:

<em>"Room 4B. The synthesis is already done. I've been waiting for you to find your own way here. —M"</em>

He's been inside the whole time. Working. Waiting. He knew you'd come alone.

The approach to the loading dock is clear — except for the Bloater that has taken up residence at the south entrance, drawn by the generator heat.`,

/* ═══════════════════════════════════════════════════
   COMBAT BRIDGE
═══════════════════════════════════════════════════ */
let pendingCombat = null;

function launchCombat(encounter, winScene, loseScene) {
  pendingCombat = { winScene, loseScene };
  const url = `combat.html?encounter=${encounter}&win=${encodeURIComponent(winScene)}&lose=${encodeURIComponent(loseScene)}&hp=${state.health}&trust=${state.trust}`;
  const frame = document.getElementById('combat-frame');
  frame.src = url;
  document.getElementById('combat-overlay').classList.add('active');
}

window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'COMBAT_RESULT') return;
  document.getElementById('combat-overlay').classList.remove('active');
  document.getElementById('combat-frame').src = '';

  const { result, hp } = e.data;
  // Update health from combat outcome
  state.health = Math.max(1, hp);
  updateStatus();

  if (!pendingCombat) return;
  const nextScene = (result === 'win' || result === 'flee')
    ? pendingCombat.winScene
    : pendingCombat.loseScene;
  pendingCombat = null;
  goToScene(nextScene);
});

/* ═══════════════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════════════ */
function updateStatus() {
  document.getElementById('stat-day').textContent = state.day;
  document.getElementById('stat-trust').textContent = (state.trust > 0 ? '+' : '') + state.trust;
  document.getElementById('stat-health').textContent = Math.max(0, state.health);
  document.getElementById('stat-chapter').textContent = state.chapter + ' / 5';
}

function addToLog(title) {
  const log = document.getElementById('scene-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = '↳ ' + title;
  log.appendChild(entry);
  while (log.children.length > 4) log.removeChild(log.firstChild);
}

function goToScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) { console.warn('Scene not found:', sceneId); return; }

  state.chapter = scene.chapter;
  state.day++;
  updateStatus();

  const currentTitle = document.getElementById('scene-title').textContent;
  if (currentTitle) addToLog(currentTitle);

  document.getElementById('scene-label').textContent = scene.label;

  const box = document.getElementById('scene-box');
  box.style.opacity = 0;
  box.style.transform = 'translateY(8px)';

  setTimeout(() => {
    document.getElementById('scene-title').textContent = scene.title;
    document.getElementById('scene-text').innerHTML = scene.text;

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';

    if (scene.ending) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = 'Continue…';
      btn.onclick = () => showEnding(scene.ending);
      choicesEl.appendChild(btn);
    } else if (scene.choices) {
      scene.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn' + (choice.combat ? ' combat-choice' : '');

        let label = choice.text;
        if (choice.tag && !choice.combat) {
          label += ` <span class="tag tag-${choice.tag}">${choice.tag.toUpperCase()}</span>`;
        }
        btn.innerHTML = label;

        btn.onclick = () => handleChoice(choice);
        choicesEl.appendChild(btn);
      });
    }

    box.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      box.style.opacity = 1;
      box.style.transform = 'translateY(0)';
    }));

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 200);
}

function handleChoice(choice) {
  // Apply stat changes
  if (choice.trust)  state.trust  = Math.max(-5, Math.min(5, state.trust + choice.trust));
  if (choice.health) state.health = Math.max(0, Math.min(100, state.health + choice.health));
  if (choice.flag)   state.flags[choice.flag] = true;
  if (choice.flag2)  state.flags[choice.flag2] = true;

  // Ghost ending trigger
  if (state.trust <= -4 && state.chapter >= 4) {
    showEnding('ending_5');
    return;
  }

  if (state.health <= 0) {
    showEnding('ending_burned');
    return;
  }

  updateStatus();

  if (choice.combat) {
    launchCombat(choice.encounter, choice.win, choice.lose);
  } else {
    goToScene(choice.next);
  }
}

function showEnding(endingId) {
  const ending = endings[endingId];
  if (!ending) { console.warn('Ending not found:', endingId); return; }

  document.getElementById('scene-box').style.display = 'none';

  const screen = document.getElementById('ending-screen');
  screen.style.display = 'block';

  const badge = document.getElementById('ending-badge');
  badge.textContent = ending.badge;
  badge.style.color = ending.color;
  badge.style.borderColor = ending.color;

  document.getElementById('ending-title').textContent = ending.title;
  document.getElementById('ending-text').textContent = ending.text;

  screen.style.opacity = 0;
  screen.style.transform = 'translateY(12px)';
  screen.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    screen.style.opacity = 1;
    screen.style.transform = 'translateY(0)';
  }));

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startGame() {
  state = { day: 1, trust: 0, health: 100, chapter: 1, flags: {} };
  pendingCombat = null;
  document.getElementById('scene-log').innerHTML = '';
  document.getElementById('scene-box').style.display = 'block';
  document.getElementById('scene-box').style.opacity = 1;
  document.getElementById('scene-box').style.transform = 'none';
  document.getElementById('ending-screen').style.display = 'none';
  document.getElementById('combat-overlay').classList.remove('active');
  updateStatus();
  goToScene('intro');
}

startGame();
</script>
