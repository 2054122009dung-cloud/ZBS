<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEAD SIGNAL — A Zombie Survival Story</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg:      #0a0a0b;
  --surface: #111114;
  --border:  #2a2a30;
  --dim:     #3a3a42;
  --muted:   #6b6b78;
  --body:    #c8c8d0;
  --bright:  #e8e8f0;
  --accent:  #c0392b;
  --accent2: #e74c3c;
  --green:   #27ae60;
  --green2:  #2ecc71;
  --amber:   #e67e22;
  --blue:    #2980b9;
  --purple:  #8e44ad;
  --mono:    'Share Tech Mono', monospace;
  --serif:   'Crimson Pro', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--body);
  font-family: var(--serif);
  font-size: 1rem;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── TOP: STORY PANEL ─────────────────────── */
#story-panel {
  flex: 0 0 auto;
  max-height: 45vh;
  overflow-y: auto;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

#story-panel::-webkit-scrollbar { width: 4px; }
#story-panel::-webkit-scrollbar-track { background: var(--bg); }
#story-panel::-webkit-scrollbar-thumb { background: var(--dim); }

/* Status bar */
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.stat { display: flex; gap: 0.3rem; align-items: center; }
.stat-label { color: var(--dim); }
.stat-val-day    { color: var(--green2); }
.stat-val-trust  { color: var(--amber); }
.stat-val-health { color: var(--accent2); }
.stat-val-chap   { color: var(--muted); }

/* Game title strip */
#title-strip {
  padding: 0.6rem 1rem 0;
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
}

.game-title {
  font-family: var(--mono);
  font-size: 1rem;
  letter-spacing: 0.2em;
  color: var(--accent2);
  text-shadow: 0 0 20px rgba(231,76,60,0.4);
  text-transform: uppercase;
}

/* Scene content */
#scene-content {
  padding: 0.5rem 1rem 0.8rem;
  flex: 1;
}

#scene-label {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

#scene-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--bright);
  margin-bottom: 0.6rem;
  line-height: 1.25;
}

#scene-text {
  font-family: var(--serif);
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--body);
  white-space: pre-line;
}

#scene-text em    { color: var(--amber); font-style: italic; }
#scene-text strong { color: var(--bright); font-weight: 600; }

.twist-callout {
  margin: 0.8rem 0;
  padding: 0.7rem 1rem;
  border-left: 3px solid var(--accent2);
  background: rgba(192,57,43,0.06);
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  color: var(--accent2);
  line-height: 1.55;
}
.twist-callout::before {
  content: '⚠ REVELATION ';
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.3rem;
}

.capture-callout {
  margin: 0.8rem 0;
  padding: 0.7rem 1rem;
  border-left: 3px solid var(--purple);
  background: rgba(142,68,173,0.07);
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  color: #bb8fce;
  line-height: 1.55;
}
.capture-callout::before {
  content: '☠ CAPTURED ';
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.3rem;
}

/* ── BOTTOM: MAP PANEL ─────────────────────── */
#map-panel {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  background: #0a0a0b;
  min-height: 0;
}

#map-canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* Hint bar above map */
#map-hint {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,11,0.85);
  border-top: 1px solid var(--border);
  padding: 0.4rem 1rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-align: center;
  pointer-events: none;
  z-index: 10;
}

/* Choice tooltip when near hotspot */
#choice-tooltip {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,15,18,0.97);
  border: 1px solid var(--accent2);
  padding: 0.6rem 1rem;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--bright);
  letter-spacing: 0.05em;
  text-align: center;
  max-width: 320px;
  pointer-events: none;
  z-index: 20;
  display: none;
  line-height: 1.5;
}

#choice-tooltip .tooltip-key {
  display: block;
  margin-top: 0.3rem;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.2em;
}

.tooltip-tag {
  display: inline-block;
  font-size: 0.52rem;
  padding: 0.1rem 0.3rem;
  border: 1px solid currentColor;
  margin-left: 0.4rem;
  letter-spacing: 0.1em;
  vertical-align: middle;
}
.tag-risk { color: var(--accent2); }
.tag-safe { color: var(--green); }
.tag-trust { color: var(--amber); }

/* Mobile D-pad */
#dpad {
  position: absolute;
  bottom: 50px;
  left: 12px;
  width: 96px;
  height: 96px;
  z-index: 30;
  display: none;
  user-select: none;
  -webkit-user-select: none;
}

.dpad-btn {
  position: absolute;
  width: 30px;
  height: 30px;
  background: rgba(40,40,50,0.85);
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  user-select: none;
}
.dpad-btn:active, .dpad-btn.pressed { background: rgba(192,57,43,0.3); border-color: var(--accent2); color: var(--bright); }
.dpad-up    { top: 0;    left: 33px; }
.dpad-down  { bottom: 0; left: 33px; }
.dpad-left  { top: 33px; left: 0;   }
.dpad-right { top: 33px; right: 0;  }

/* Interact button (mobile) */
#interact-btn {
  position: absolute;
  bottom: 50px;
  right: 12px;
  width: 52px;
  height: 52px;
  background: rgba(192,57,43,0.25);
  border: 2px solid var(--accent2);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--accent2);
  letter-spacing: 0.05em;
  cursor: pointer;
  z-index: 30;
  flex-direction: column;
  line-height: 1.2;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  text-align: center;
}

/* Combat overlay iframe */
#combat-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#combat-overlay.active { display: flex; }
#combat-frame { width: 100%; max-width: 700px; height: 100dvh; border: none; background: #0a0a0b; }

/* Ending screen */
#ending-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  overflow-y: auto;
  padding: 2rem 1.5rem 3rem;
  flex-direction: column;
  align-items: center;
}
#ending-overlay.show { display: flex; }
.ending-inner { max-width: 560px; width: 100%; }
.ending-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 0.8rem; text-transform: uppercase; }
.ending-badge { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.25rem 0.7rem; border: 1px solid currentColor; display: inline-block; margin-bottom: 1.2rem; }
.ending-title { font-family: var(--serif); font-size: clamp(1.3rem,4vw,2rem); font-weight: 600; color: var(--bright); margin-bottom: 1rem; line-height: 1.25; }
.ending-text  { font-family: var(--serif); font-size: 1rem; line-height: 1.85; color: var(--body); white-space: pre-line; margin-bottom: 2rem; }
.ending-divider { width: 100%; height: 1px; background: var(--border); margin: 1.5rem 0; }
#restart-btn {
  background: none;
  border: 1px solid var(--dim);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  padding: 0.7rem 1.5rem;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
#restart-btn:hover { border-color: var(--body); color: var(--body); }

/* Scene transition overlay */
#transition-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 150;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#transition-overlay.fade-in  { opacity: 1; }
#transition-overlay.fade-out { opacity: 0; }
</style>
</head>
<body>

<!-- Story panel (top) -->
<div id="story-panel">
  <div id="status-bar">
    <div class="stat"><span class="stat-label">DAY</span><span class="stat-val-day" id="stat-day">1</span></div>
    <div class="stat"><span class="stat-label">TRUST</span><span class="stat-val-trust" id="stat-trust">0</span></div>
    <div class="stat"><span class="stat-label">HP</span><span class="stat-val-health" id="stat-health">100</span></div>
    <div class="stat"><span class="stat-label">CH</span><span class="stat-val-chap" id="stat-chapter">1/5</span></div>
  </div>
  <div id="title-strip">
    <span class="game-title">DEAD SIGNAL</span>
  </div>
  <div id="scene-content">
    <div id="scene-label"></div>
    <div id="scene-title"></div>
    <div id="scene-text"></div>
  </div>
</div>

<!-- Map panel (bottom) -->
<div id="map-panel">
  <canvas id="map-canvas"></canvas>
  <div id="choice-tooltip">
    <span id="tooltip-text">—</span>
    <span class="tooltip-key">[ E ] hoặc [ SPACE ] để chọn</span>
  </div>
  <div id="map-hint">WASD / MŨI TÊN — di chuyển &nbsp;|&nbsp; E / SPACE — tương tác</div>

  <!-- Mobile controls -->
  <div id="dpad">
    <div class="dpad-btn dpad-up"    data-dir="up">▲</div>
    <div class="dpad-btn dpad-down"  data-dir="down">▼</div>
    <div class="dpad-btn dpad-left"  data-dir="left">◄</div>
    <div class="dpad-btn dpad-right" data-dir="right">►</div>
  </div>
  <div id="interact-btn">E<br><span style="font-size:0.5rem">ENTER</span></div>
</div>

<!-- Combat overlay -->
<div id="combat-overlay">
  <iframe id="combat-frame" src="" title="Combat"></iframe>
</div>

<!-- Ending overlay -->
<div id="ending-overlay">
  <div class="ending-inner">
    <div class="ending-label">ENDING REACHED</div>
    <div id="ending-badge" class="ending-badge"></div>
    <div id="ending-title" class="ending-title"></div>
    <div class="ending-divider"></div>
    <div id="ending-text" class="ending-text"></div>
    <button id="restart-btn" onclick="startGame()">↺ CHƠI LẠI</button>
  </div>
</div>

<!-- Transition overlay -->
<div id="transition-overlay"></div>

<script>
/* ═══════════════════════════════════════════════════
   COLOUR PALETTE (for canvas drawing)
═══════════════════════════════════════════════════ */
const C = {
  bg:      '#0a0a0b',
  road:    '#141418',
  roadMark:'#2a2a32',
  sidewalk:'#1a1a1e',
  grass:   '#0e1a0e',
  grass2:  '#0c160c',
  rubble:  '#1e1c1a',
  buildA:  '#161618',
  buildB:  '#18181c',
  buildC:  '#14141a',
  window0: '#0a0a0c',
  window1: '#1a2a18',
  window2: '#2a1a10',
  windowL: '#c8a040',
  car1:    '#1a2030',
  car2:    '#2a1018',
  car3:    '#1a2818',
  blood:   '#3a0a08',
  fence:   '#2a2828',
  player:  '#e8e8f0',
  playerAcc:'#e74c3c',
  zombie:  '#4a3820',
  zombieAcc:'#8a2018',
  zombieEye:'#c0392b',
  hotspot: '#e74c3c',
  hotspotG: '#27ae60',
  hotspotB: '#2980b9',
  hotspotP: '#8e44ad',
  amber:   '#e67e22',
};

/* ═══════════════════════════════════════════════════
   TILE CONSTANTS
═══════════════════════════════════════════════════ */
const TILE = 24;
const COLS = 26;
const ROWS = 18;

/* Tile type IDs */
const T = { ROAD:0, SIDE:1, GRASS:2, BUILD:3, RUBBLE:4, CAR:5, FENCE:6, BLOOD:7 };

/* ═══════════════════════════════════════════════════
   MAP GENERATOR
   Produces a fresh tile grid + building rects per scene
═══════════════════════════════════════════════════ */
function generateMap(seed) {
  // Seeded RNG
  let s = seed * 9301 + 49297;
  const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const ri = (a,b) => Math.floor(rng()*(b-a+1))+a;

  const grid = Array.from({length:ROWS}, () => new Array(COLS).fill(T.ROAD));

  // Horizontal road at row 8-9 (main street)
  for (let c=0;c<COLS;c++) { grid[8][c]=T.ROAD; grid[9][c]=T.ROAD; }
  // Road markings stored separately

  // Vertical road at col 12-13
  for (let r=0;r<ROWS;r++) { grid[r][12]=T.ROAD; grid[r][13]=T.ROAD; }

  // Sidewalks around roads
  const sidewalkRows = [7,10], sidewalkCols = [11,14];
  for (let c=0;c<COLS;c++) { sidewalkRows.forEach(r=>{ if(grid[r][c]===T.ROAD) return; grid[r][c]=T.SIDE; }); }
  for (let r=0;r<ROWS;r++) { sidewalkCols.forEach(c=>{ if(grid[r][c]===T.ROAD) return; grid[r][c]=T.SIDE; }); }

  // Buildings in quadrants — leave 2 tile buffer around roads
  const buildings = [];
  function placeBuilding(minC,maxC,minR,maxR,color) {
    const w=ri(3,Math.min(5,maxC-minC)); const h=ri(3,Math.min(4,maxR-minR));
    const c=ri(minC,maxC-w); const r=ri(minR,maxR-h);
    buildings.push({c,r,w,h,color});
    for(let rr=r;rr<r+h;rr++) for(let cc=c;cc<c+w;cc++) grid[rr][cc]=T.BUILD;
  }
  // Four quadrants
  for(let i=0;i<3;i++) placeBuilding(0,10,0,6,ri(0,2));
  for(let i=0;i<3;i++) placeBuilding(15,25,0,6,ri(0,2));
  for(let i=0;i<3;i++) placeBuilding(0,10,11,17,ri(0,2));
  for(let i=0;i<3;i++) placeBuilding(15,25,11,17,ri(0,2));

  // Rubble patches
  for(let i=0;i<8;i++) {
    const c=ri(0,COLS-1), r=ri(0,ROWS-1);
    if(grid[r][c]===T.ROAD||grid[r][c]===T.SIDE) { grid[r][c]=T.RUBBLE; }
  }

  // Wrecked cars on road
  const cars = [];
  for(let i=0;i<4;i++) {
    const roadTiles = [[8,ri(1,10)],[8,ri(15,24)],[9,ri(1,10)],[9,ri(15,24)]];
    const [rr,cc] = roadTiles[i % roadTiles.length];
    if(grid[rr][cc]===T.ROAD) {
      grid[rr][cc]=T.CAR;
      cars.push({c:cc,r:rr,rot:ri(0,3),color:ri(0,2)});
    }
  }

  // Blood stains
  for(let i=0;i<5;i++) {
    const c=ri(0,COLS-1),r=ri(0,ROWS-1);
    if(grid[r][c]===T.ROAD||grid[r][c]===T.SIDE) grid[r][c]=T.BLOOD;
  }

  return {grid, buildings, cars, rng};
}

/* ═══════════════════════════════════════════════════
   DRAW FUNCTIONS
═══════════════════════════════════════════════════ */
function drawTile(ctx, c, r, type, frame) {
  const x = c*TILE, y = r*TILE;
  switch(type) {
    case T.ROAD:
      ctx.fillStyle = C.road;
      ctx.fillRect(x,y,TILE,TILE);
      // subtle noise
      if((c+r)%3===0){ ctx.fillStyle='rgba(255,255,255,0.012)'; ctx.fillRect(x,y,TILE,TILE); }
      break;
    case T.SIDE:
      ctx.fillStyle = C.sidewalk;
      ctx.fillRect(x,y,TILE,TILE);
      // crack lines
      if((c*3+r*7)%11===0){
        ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(x+4,y+4); ctx.lineTo(x+TILE-4,y+TILE-4); ctx.stroke();
      }
      break;
    case T.GRASS:
      ctx.fillStyle = (c+r)%2===0?C.grass:C.grass2;
      ctx.fillRect(x,y,TILE,TILE);
      break;
    case T.BUILD:
      // Buildings drawn separately as rects, tiles just show interior
      ctx.fillStyle = C.buildA;
      ctx.fillRect(x,y,TILE,TILE);
      break;
    case T.RUBBLE:
      ctx.fillStyle = C.rubble;
      ctx.fillRect(x,y,TILE,TILE);
      // rubble dots
      ctx.fillStyle='rgba(80,70,60,0.4)';
      for(let i=0;i<4;i++) ctx.fillRect(x+((c*7+i*5)%18)+2, y+((r*5+i*7)%18)+2, 2, 2);
      break;
    case T.BLOOD:
      ctx.fillStyle = C.road;
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = C.blood;
      ctx.beginPath();
      ctx.ellipse(x+TILE/2,y+TILE/2,TILE/3,TILE/4,c*0.5,0,Math.PI*2);
      ctx.fill();
      break;
    case T.CAR:
      ctx.fillStyle = C.road;
      ctx.fillRect(x,y,TILE,TILE);
      break;
  }
}

function drawBuilding(ctx, b) {
  const x=b.c*TILE, y=b.r*TILE, w=b.w*TILE, h=b.h*TILE;
  const colors=[C.buildA,C.buildB,C.buildC];
  ctx.fillStyle=colors[b.color%3];
  ctx.fillRect(x,y,w,h);
  // outline
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  // windows
  const wCols=Math.max(1,b.w-1), wRows=Math.max(1,b.h-1);
  for(let wr=0;wr<wRows;wr++) for(let wc=0;wc<wCols;wc++) {
    const wx=x+(wc+0.5)*(w/wCols)-4;
    const wy=y+(wr+0.5)*(h/wRows)-3;
    const litRand=(b.c*17+b.r*13+wr*7+wc*3)%11;
    ctx.fillStyle=litRand<4?C.window0:litRand<7?C.window1:litRand<9?C.window2:C.window0;
    ctx.fillRect(wx,wy,8,6);
    // occasional lit window
    if((b.c+b.r+wr+wc)%9===0){
      ctx.fillStyle=C.windowL; ctx.globalAlpha=0.5;
      ctx.fillRect(wx+1,wy+1,6,4);
      ctx.globalAlpha=1;
    }
  }
}

function drawCar(ctx, car) {
  const x=car.c*TILE, y=car.r*TILE;
  const carColors=[C.car1,C.car2,C.car3];
  ctx.save();
  ctx.translate(x+TILE/2, y+TILE/2);
  if(car.rot%2===1) ctx.rotate(Math.PI*0.5);
  ctx.fillStyle=carColors[car.color%3];
  // Body
  ctx.fillRect(-10,-6,20,12);
  // Windows
  ctx.fillStyle='rgba(100,150,200,0.15)';
  ctx.fillRect(-6,-4,12,8);
  // Damage
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
  ctx.strokeRect(-10,-6,20,12);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════
   HOTSPOT ICONS
═══════════════════════════════════════════════════ */
const HOTSPOT_ICONS = {
  risk:    (ctx,x,y,pulse,label) => drawHotspot(ctx,x,y,pulse,label,C.hotspot,'⚠'),
  safe:    (ctx,x,y,pulse,label) => drawHotspot(ctx,x,y,pulse,label,C.hotspotG,'🛡'),
  trust:   (ctx,x,y,pulse,label) => drawHotspot(ctx,x,y,pulse,label,C.amber,'♦'),
  combat:  (ctx,x,y,pulse,label) => drawHotspot(ctx,x,y,pulse,label,C.hotspot,'⚔'),
  default: (ctx,x,y,pulse,label) => drawHotspot(ctx,x,y,pulse,label,C.hotspotB,'→'),
};

function drawHotspot(ctx, x, y, pulse, label, color, icon) {
  const r = 10 + Math.sin(pulse)*2;
  // Glow
  ctx.save();
  ctx.globalAlpha = 0.15 + 0.08*Math.sin(pulse);
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x,y,r+8,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Ring
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,3]);
  ctx.lineDashOffset = -pulse*2;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // Center dot
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();

  // Label
  ctx.fillStyle = color;
  ctx.font = '500 8px Share Tech Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  // Background for readability
  const tw = ctx.measureText(label).width;
  ctx.fillStyle='rgba(10,10,11,0.85)';
  ctx.fillRect(x-tw/2-3, y-r-14, tw+6, 11);
  ctx.fillStyle=color;
  ctx.fillText(label, x, y-r-4);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════
   PLAYER SPRITE
═══════════════════════════════════════════════════ */
function drawPlayer(ctx, px, py, dir, frame, isMoving) {
  const x=Math.round(px), y=Math.round(py);
  const walkFrame = isMoving ? Math.floor(frame/8)%4 : 0;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0,9,6,3,0,0,Math.PI*2); ctx.fill();

  // Legs animation
  const legSwing = isMoving ? Math.sin(frame*0.25)*3 : 0;
  ctx.fillStyle='#2a2a38';
  if(walkFrame===0||walkFrame===2) {
    ctx.fillRect(-4,5,3,8);
    ctx.fillRect(1,5,3,8);
  } else if(walkFrame===1) {
    ctx.save(); ctx.translate(-2,9); ctx.rotate(legSwing*0.15);
    ctx.fillRect(-2,-4,3,8); ctx.restore();
    ctx.save(); ctx.translate(2,9); ctx.rotate(-legSwing*0.15);
    ctx.fillRect(-1,-4,3,8); ctx.restore();
  } else {
    ctx.save(); ctx.translate(-2,9); ctx.rotate(-legSwing*0.15);
    ctx.fillRect(-2,-4,3,8); ctx.restore();
    ctx.save(); ctx.translate(2,9); ctx.rotate(legSwing*0.15);
    ctx.fillRect(-1,-4,3,8); ctx.restore();
  }

  // Body (jacket)
  ctx.fillStyle='#2e3040';
  ctx.fillRect(-5,-2,10,9);
  // Belt
  ctx.fillStyle='#3a3020';
  ctx.fillRect(-5,5,10,2);

  // Arms
  const armSwing = isMoving ? Math.sin(frame*0.25)*4 : 0;
  ctx.fillStyle='#2e3040';
  ctx.save(); ctx.translate(-6,2); ctx.rotate(-armSwing*0.08);
  ctx.fillRect(-1,-1,3,7); ctx.restore();
  ctx.save(); ctx.translate(6,2); ctx.rotate(armSwing*0.08);
  ctx.fillRect(-2,-1,3,7); ctx.restore();

  // Head
  ctx.fillStyle='#c8a880';
  ctx.fillRect(-4,-10,8,8);

  // Hair / direction indicator
  ctx.fillStyle='#3a2a10';
  ctx.fillRect(-4,-10,8,3);

  // Eyes based on direction
  ctx.fillStyle='#1a1a2a';
  if(dir==='right')  { ctx.fillRect(2,-7,2,2); }
  else if(dir==='left') { ctx.fillRect(-4,-7,2,2); }
  else if(dir==='up')   { ctx.fillRect(-2,-8,2,2); ctx.fillRect(1,-8,2,2); }
  else                  { ctx.fillRect(-2,-4,2,2); ctx.fillRect(1,-4,2,2); }

  // Player highlight dot (accent color)
  ctx.fillStyle=C.hotspot;
  ctx.fillRect(-1,-11,3,2);

  ctx.restore();
}

/* ═══════════════════════════════════════════════════
   ZOMBIE SPRITES
═══════════════════════════════════════════════════ */
function drawZombie(ctx, zx, zy, frame, variant) {
  const x=Math.round(zx), y=Math.round(zy);
  ctx.save();
  ctx.translate(x,y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0,8,5,2.5,0,0,Math.PI*2); ctx.fill();

  const t = frame*0.04;
  const wobble = Math.sin(t+variant)*2;

  // Legs (shuffling)
  ctx.fillStyle=variant%2===0?'#2a1808':'#1a2010';
  const lStep = Math.sin(t)*3;
  ctx.fillRect(-4+lStep,4,3,7);
  ctx.fillRect(1-lStep,4,3,7);

  // Body (hunched)
  ctx.fillStyle=variant%3===0?'#3a2010':'#2a3010';
  ctx.save(); ctx.rotate(wobble*0.04);
  ctx.fillRect(-4,-1,9,7);
  ctx.restore();

  // Arms (hanging/reaching)
  ctx.fillStyle=variant%2===0?'#3a2010':'#2a3010';
  const reach = Math.sin(t+1)*4;
  ctx.save(); ctx.translate(-5,1); ctx.rotate(0.3+reach*0.05);
  ctx.fillRect(-1,0,3,8); ctx.restore();
  ctx.save(); ctx.translate(5,1); ctx.rotate(-0.3+reach*0.05);
  ctx.fillRect(-2,0,3,8); ctx.restore();

  // Head
  ctx.fillStyle='#4a3820';
  ctx.save(); ctx.rotate(wobble*0.06);
  ctx.fillRect(-4,-9,8,8);
  // Rot patch
  ctx.fillStyle='rgba(80,20,10,0.5)';
  ctx.fillRect(-2,-8,3,3);
  // Eyes
  ctx.fillStyle=C.zombieEye;
  ctx.fillRect(-3,-7,2,2);
  ctx.fillRect(1,-7,2,2);
  ctx.restore();

  ctx.restore();
}

This, you decide, is a reasonable price.

/* ═══════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════ */
let state = { day:1, trust:0, health:100, chapter:1, flags:{} };

/* ═══════════════════════════════════════════════════
   MAP ENGINE
═══════════════════════════════════════════════════ */
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');

let mapState = {
  grid: null,
  buildings: [],
  cars: [],
  hotspots: [],
  player: { x:0, y:0, dir:'down', speed:2 },
  zombies: [],
  frame: 0,
  nearHotspot: null,
  mapReady: false,
  pulseT: 0,
};

// Input
const keys = {};
const mobileDir = {};

function initCanvas() {
  const panel = document.getElementById('map-panel');
  canvas.width = panel.clientWidth;
  canvas.height = panel.clientHeight;
}

function buildMap(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  // Generate map from scene seed
  const seed = sceneId.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const gen = generateMap(seed);
  mapState.grid = gen.grid;
  mapState.buildings = gen.buildings;
  mapState.cars = gen.cars;

  // Place player at center road intersection
  const cw = canvas.width / COLS, ch = canvas.height / ROWS;
  mapState.player.x = 12.5 * cw;
  mapState.player.y = 8.5 * ch;
  mapState.player.dir = 'down';

  // Place hotspots for each choice
  mapState.hotspots = placeHotspots(scene.choices, gen, cw, ch);

  // Spawn ambient zombies
  mapState.zombies = [];
  for (let i=0; i<6; i++) {
    const rng = gen.rng;
    let zc, zr;
    do {
      zc = Math.floor(rng()*(COLS-2))+1;
      zr = Math.floor(rng()*(ROWS-2))+1;
    } while (mapState.grid[zr][zc] !== T.ROAD && mapState.grid[zr][zc] !== T.SIDE && mapState.grid[zr][zc] !== T.BLOOD);
    mapState.zombies.push({
      x: (zc+0.5)*cw, y: (zr+0.5)*ch,
      dx: (rng()-0.5)*0.4, dy: (rng()-0.5)*0.4,
      variant: i, wander: 0, wanderDir: rng()*Math.PI*2,
    });
  }

  mapState.mapReady = true;
  mapState.nearHotspot = null;
  hideTooltip();
}

function placeHotspots(choices, gen, cw, ch) {
  // Distribute hotspots across different quadrants
  const positions = [
    {qc:1, qr:1},   // top-left building zone
    {qc:15, qr:1},  // top-right
    {qc:1, qr:11},  // bottom-left
    {qc:15, qr:11}, // bottom-right
    // extras near roads
    {qc:5, qr:8},   // left road
    {qc:18, qr:9},  // right road
    {qc:12, qr:3},  // top center road
    {qc:13, qr:14}, // bottom center road
  ];

  return choices.map((choice, i) => {
    const pos = positions[i % positions.length];
    // Find nearest walkable tile in quadrant
    let bestC = pos.qc, bestR = pos.qr;
    for (let dr=-3; dr<=3; dr++) for (let dc=-3; dc<=3; dc++) {
      const r=pos.qr+dr, c=pos.qc+dc;
      if(r<0||r>=ROWS||c<0||c>=COLS) continue;
      const t=mapState.grid[r][c];
      if(t===T.ROAD||t===T.SIDE||t===T.BLOOD) { bestC=c; bestR=r; break; }
    }
    return {
      x: (bestC+0.5)*cw,
      y: (bestR+0.5)*ch,
      label: choice.label || choice.text.slice(0,20)+'…',
      fullText: choice.text,
      tag: choice.encounter ? 'combat' : (choice.tag || 'default'),
      choice: choice,
      reached: false,
    };
  });
}

/* ═══════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════ */
let animId;

function gameLoop() {
  animId = requestAnimationFrame(gameLoop);
  if (!mapState.mapReady) return;

  mapState.frame++;
  mapState.pulseT += 0.06;

  updatePlayer();
  updateZombies();
  checkHotspots();
  renderMap();
}

function updatePlayer() {
  const p = mapState.player;
  const cw = canvas.width / COLS, ch = canvas.height / ROWS;
  let dx=0, dy=0;

  if (keys['ArrowUp']||keys['KeyW']||mobileDir.up)    dy=-1;
  if (keys['ArrowDown']||keys['KeyS']||mobileDir.down) dy=1;
  if (keys['ArrowLeft']||keys['KeyA']||mobileDir.left) dx=-1;
  if (keys['ArrowRight']||keys['KeyD']||mobileDir.right) dx=1;

  if (dx||dy) {
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len; dy/=len;

    const nx=p.x+dx*p.speed, ny=p.y+dy*p.speed;
    const nc=Math.floor(nx/cw), nr=Math.floor(ny/ch);

    // Collision — can't walk into buildings
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) {
      const t=mapState.grid[nr][nc];
      if(t!==T.BUILD&&t!==T.FENCE) {
        p.x=Math.max(8,Math.min(canvas.width-8,nx));
        p.y=Math.max(8,Math.min(canvas.height-8,ny));
      }
    }

    // Direction
    if (Math.abs(dx)>Math.abs(dy)) p.dir=dx>0?'right':'left';
    else p.dir=dy>0?'down':'up';

    p.moving = true;
  } else {
    p.moving = false;
  }
}

function updateZombies() {
  const cw=canvas.width/COLS, ch=canvas.height/ROWS;
  mapState.zombies.forEach(z => {
    z.wander++;
    if(z.wander>80+z.variant*20) {
      z.wanderDir += (Math.random()-0.5)*1.2;
      z.wander=0;
    }
    const speed=0.3;
    const nx=z.x+Math.cos(z.wanderDir)*speed;
    const ny=z.y+Math.sin(z.wanderDir)*speed;
    const nc=Math.floor(nx/cw), nr=Math.floor(ny/ch);
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) {
      const t=mapState.grid[nr][nc];
      if(t!==T.BUILD&&t!==T.FENCE) {
        z.x=Math.max(8,Math.min(canvas.width-8,nx));
        z.y=Math.max(8,Math.min(canvas.height-8,ny));
      } else {
        z.wanderDir += Math.PI + (Math.random()-0.5)*0.5;
      }
    }
  });
}

function checkHotspots() {
  const p=mapState.player;
  const RADIUS=36;
  mapState.nearHotspot=null;
  mapState.hotspots.forEach(h=>{
    const d=Math.hypot(p.x-h.x, p.y-h.y);
    if(d<RADIUS) mapState.nearHotspot=h;
  });
  if(mapState.nearHotspot) showTooltip(mapState.nearHotspot);
  else hideTooltip();
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function renderMap() {
  const cw=canvas.width/COLS, ch=canvas.height/ROWS;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Tiles
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    // Scale tile to canvas
    ctx.save();
    ctx.translate(c*cw-c*TILE+(c*cw), r*ch-r*TILE+(r*ch));
    // Just draw scaled
    ctx.restore();
    drawTileScaled(ctx, c, r, mapState.grid[r][c], cw, ch);
  }

  // Road markings (dashed center lines)
  ctx.strokeStyle='rgba(60,60,70,0.5)';
  ctx.lineWidth=1;
  ctx.setLineDash([cw*0.4,cw*0.6]);
  ctx.beginPath();
  ctx.moveTo(0, 8.5*ch); ctx.lineTo(canvas.width, 8.5*ch);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12.5*cw, 0); ctx.lineTo(12.5*cw, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Buildings
  mapState.buildings.forEach(b => {
    drawBuildingScaled(ctx, b, cw, ch);
  });

  // Cars
  mapState.cars.forEach(car => {
    drawCarScaled(ctx, car, cw, ch);
  });

  // Hotspots
  mapState.hotspots.forEach(h=>{
    const drawFn = HOTSPOT_ICONS[h.tag] || HOTSPOT_ICONS.default;
    drawFn(ctx, h.x, h.y, mapState.pulseT + mapState.hotspots.indexOf(h)*1.2, h.label);
  });

  // Zombies (behind player)
  mapState.zombies.sort((a,b)=>a.y-b.y).forEach(z=>{
    if(z.y<mapState.player.y) drawZombie(ctx, z.x, z.y, mapState.frame, z.variant);
  });

  // Player
  drawPlayer(ctx, mapState.player.x, mapState.player.y, mapState.player.dir, mapState.frame, mapState.player.moving);

  // Zombies (in front of player)
  mapState.zombies.forEach(z=>{
    if(z.y>=mapState.player.y) drawZombie(ctx, z.x, z.y, mapState.frame, z.variant);
  });

  // Near-hotspot highlight ring on player
  if(mapState.nearHotspot) {
    ctx.save();
    ctx.globalAlpha=0.3+0.15*Math.sin(mapState.pulseT*3);
    ctx.strokeStyle='#e74c3c';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(mapState.player.x, mapState.player.y, 14, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawTileScaled(ctx, c, r, type, cw, ch) {
  const x=c*cw, y=r*ch;
  switch(type) {
    case T.ROAD:
      ctx.fillStyle=C.road;
      ctx.fillRect(x,y,cw+1,ch+1);
      if((c+r)%4===0){ ctx.fillStyle='rgba(255,255,255,0.015)'; ctx.fillRect(x,y,cw,ch); }
      break;
    case T.SIDE:
      ctx.fillStyle=C.sidewalk;
      ctx.fillRect(x,y,cw+1,ch+1);
      if((c*3+r*7)%9===0){
        ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(x+2,y+2); ctx.lineTo(x+cw-2,y+ch-2); ctx.stroke();
      }
      break;
    case T.BUILD:
      ctx.fillStyle=C.buildB;
      ctx.fillRect(x,y,cw+1,ch+1);
      break;
    case T.RUBBLE:
      ctx.fillStyle=C.rubble;
      ctx.fillRect(x,y,cw+1,ch+1);
      ctx.fillStyle='rgba(90,80,70,0.35)';
      ctx.fillRect(x+2,y+2,cw*0.3,ch*0.3);
      ctx.fillRect(x+cw*0.6,y+ch*0.5,cw*0.25,ch*0.25);
      break;
    case T.BLOOD:
      ctx.fillStyle=C.road;
      ctx.fillRect(x,y,cw+1,ch+1);
      ctx.fillStyle=C.blood;
      ctx.beginPath();
      ctx.ellipse(x+cw/2,y+ch/2,cw*0.38,ch*0.3,c*0.5,0,Math.PI*2);
      ctx.fill();
      break;
    case T.CAR:
      ctx.fillStyle=C.road;
      ctx.fillRect(x,y,cw+1,ch+1);
      break;
  }
}

function drawBuildingScaled(ctx, b, cw, ch) {
  const x=b.c*cw, y=b.r*ch, w=b.w*cw, h=b.h*ch;
  const colors=[C.buildA,C.buildB,C.buildC];
  ctx.fillStyle=colors[b.color%3];
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  // Windows
  const wCols=Math.max(1,b.w-1), wRows=Math.max(1,b.h-1);
  const ww=cw*0.55, wh=ch*0.5;
  for(let wr=0;wr<wRows;wr++) for(let wc=0;wc<wCols;wc++) {
    const wx=x+(wc+0.5)*(w/wCols)-ww/2;
    const wy=y+(wr+0.5)*(h/wRows)-wh/2;
    const litRand=(b.c*17+b.r*13+wr*7+wc*3)%11;
    ctx.fillStyle=litRand<4?C.window0:litRand<7?C.window1:litRand<9?C.window2:C.window0;
    ctx.fillRect(wx,wy,ww,wh);
    if((b.c+b.r+wr+wc)%9===0){
      ctx.fillStyle=C.windowL; ctx.globalAlpha=0.4;
      ctx.fillRect(wx+1,wy+1,ww-2,wh-2);
      ctx.globalAlpha=1;
    }
  }
}

function drawCarScaled(ctx, car, cw, ch) {
  const x=car.c*cw, y=car.r*ch;
  const carColors=[C.car1,C.car2,C.car3];
  ctx.save();
  ctx.translate(x+cw/2, y+ch/2);
  if(car.rot%2===1) ctx.rotate(Math.PI*0.5);
  const bw=cw*0.75, bh=ch*0.55;
  ctx.fillStyle=carColors[car.color%3];
  ctx.fillRect(-bw/2,-bh/2,bw,bh);
  ctx.fillStyle='rgba(100,150,200,0.12)';
  ctx.fillRect(-bw/2+2,-bh/2+2,bw-4,bh-4);
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(-bw/2,-bh/2,bw,bh);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════ */
function showTooltip(h) {
  const el=document.getElementById('choice-tooltip');
  const txt=document.getElementById('tooltip-text');
  const tagColors={combat:C.hotspot,risk:C.hotspot,safe:C.hotspotG,trust:C.amber,default:C.hotspotB};
  const color=tagColors[h.tag]||C.hotspotB;
  const tagLabel=h.tag==='combat'?'⚔ COMBAT':h.tag==='risk'?'⚠ RISK':h.tag==='safe'?'🛡 SAFE':h.tag==='trust'?'♦ TRUST':'';
  txt.innerHTML=`<span style="color:${color}">${h.label}</span>${tagLabel?`<br><span style="font-size:0.58rem;color:${color};opacity:0.7">${tagLabel}</span>`:''}`;
  el.style.display='block';
}

function hideTooltip() {
  document.getElementById('choice-tooltip').style.display='none';
}

/* ═══════════════════════════════════════════════════
   SCENE MANAGEMENT
═══════════════════════════════════════════════════ */
let currentScene = null;
let pendingCombat = null;

function goToScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) { console.warn('Scene not found:', sceneId); return; }

  currentScene = sceneId;
  state.chapter = scene.chapter;
  state.day++;
  updateStatus();

  // Fade transition
  const ov=document.getElementById('transition-overlay');
  ov.classList.add('fade-in');

  setTimeout(()=>{
    // Update story text
    document.getElementById('scene-label').textContent=scene.label;
    document.getElementById('scene-title').textContent=scene.title;
    document.getElementById('scene-text').innerHTML=scene.text;

    // Scroll story to top
    document.getElementById('story-panel').scrollTop=0;

    // Rebuild map
    buildMap(sceneId);

    ov.classList.remove('fade-in');
    ov.classList.add('fade-out');
    setTimeout(()=>ov.classList.remove('fade-out'),350);
  }, 320);

  // Handle immediate ending scene
  if (scene.ending && !scene.choices) {
    setTimeout(()=>showEnding(scene.ending), 1200);
  }
}

function handleChoice(choice) {
  if (choice.trust)  state.trust  = Math.max(-5, Math.min(5, state.trust+choice.trust));
  if (choice.health) state.health = Math.max(0, Math.min(100, state.health+choice.health));
  if (choice.flag)   state.flags[choice.flag]=true;
  if (choice.flag2)  state.flags[choice.flag2]=true;

  // Ghost ending
  if (state.trust<=-4 && state.chapter>=4) { showEnding('ending_5'); return; }
  if (state.health<=0) { showEnding('ending_burned'); return; }

  updateStatus();

  if (choice.encounter) {
    launchCombat(choice.encounter, choice.win, choice.lose);
  } else if (choice.next) {
    if (choice.ending) showEnding(choice.ending);
    else goToScene(choice.next);
  } else if (scenes[currentScene] && scenes[currentScene].ending) {
    showEnding(scenes[currentScene].ending);
  }
}

/* ═══════════════════════════════════════════════════
   INTERACT — called when player presses E/Space
═══════════════════════════════════════════════════ */
function interact() {
  if (!mapState.nearHotspot) return;
  const h=mapState.nearHotspot;
  mapState.nearHotspot=null;
  hideTooltip();
  handleChoice(h.choice);
}

/* ═══════════════════════════════════════════════════
   COMBAT BRIDGE
═══════════════════════════════════════════════════ */
function launchCombat(encounter, winScene, loseScene) {
  pendingCombat={winScene, loseScene};
  const url=`dead_signal_combat.html?encounter=${encounter}&win=${encodeURIComponent(winScene)}&lose=${encodeURIComponent(loseScene)}&hp=${state.health}&trust=${state.trust}`;
  document.getElementById('combat-frame').src=url;
  document.getElementById('combat-overlay').classList.add('active');
}

window.addEventListener('message', (e)=>{
  if(!e.data||e.data.type!=='COMBAT_RESULT') return;
  document.getElementById('combat-overlay').classList.remove('active');
  document.getElementById('combat-frame').src='';
  const {result, hp}=e.data;
  state.health=Math.max(1,hp);
  updateStatus();
  if(!pendingCombat) return;
  const next=(result==='win'||result==='flee')?pendingCombat.winScene:pendingCombat.loseScene;
  pendingCombat=null;
  goToScene(next);
});

/* ═══════════════════════════════════════════════════
   ENDINGS
═══════════════════════════════════════════════════ */
const ending_5={badge:'ENDING — THE GHOST',color:'#6b6b78',title:"You Disappeared",text:`Nobody finds you. This is, for a long time, the point.

The world recovers through other paths — slower, more expensive in lives, but real. The outbreak ends the way most catastrophes end: not with a solution, but with exhaustion.

You become a folk story. Survivors in three cities have a legend about a person who wandered through and left things better, and was gone before names could be exchanged.

Emil sends you the transcript and a note: "I know it's you. You don't have to tell me if you don't want to."

You write back. You use your name.`};

function showEnding(endingId) {
  const e=endings[endingId]||(endingId==='ending_5'?ending_5:null);
  if(!e){console.warn('No ending:',endingId);return;}
  cancelAnimationFrame(animId);
  const ov=document.getElementById('ending-overlay');
  const badge=document.getElementById('ending-badge');
  badge.textContent=e.badge;
  badge.style.color=e.color;
  badge.style.borderColor=e.color;
  document.getElementById('ending-title').textContent=e.title;
  document.getElementById('ending-text').textContent=e.text;
  ov.classList.add('show');
}

/* ═══════════════════════════════════════════════════
   STATUS
═══════════════════════════════════════════════════ */
function updateStatus() {
  document.getElementById('stat-day').textContent=state.day;
  const t=state.trust;
  document.getElementById('stat-trust').textContent=(t>0?'+':'')+t;
  document.getElementById('stat-health').textContent=Math.max(0,state.health);
  document.getElementById('stat-chapter').textContent=state.chapter+'/5';
}

/* ═══════════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='KeyE'||e.code==='Space') { e.preventDefault(); interact(); }
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

// Mobile D-pad
document.querySelectorAll('.dpad-btn').forEach(btn=>{
  const dir=btn.dataset.dir;
  btn.addEventListener('touchstart',e=>{e.preventDefault();mobileDir[dir]=true;btn.classList.add('pressed');},{passive:false});
  btn.addEventListener('touchend',  e=>{e.preventDefault();mobileDir[dir]=false;btn.classList.remove('pressed');},{passive:false});
  btn.addEventListener('mousedown', e=>{mobileDir[dir]=true; btn.classList.add('pressed');});
  btn.addEventListener('mouseup',   e=>{mobileDir[dir]=false;btn.classList.remove('pressed');});
});

document.getElementById('interact-btn').addEventListener('click', interact);
document.getElementById('interact-btn').addEventListener('touchstart', e=>{e.preventDefault();interact();},{passive:false});

/* ═══════════════════════════════════════════════════
   MOBILE DETECTION
═══════════════════════════════════════════════════ */
function checkMobile() {
  const isMobile = window.innerWidth < 768 || ('ontouchstart' in window);
  document.getElementById('dpad').style.display = isMobile ? 'block' : 'none';
  document.getElementById('interact-btn').style.display = isMobile ? 'flex' : 'none';
  document.getElementById('map-hint').textContent = isMobile
    ? 'D-PAD — di chuyển  |  E — tương tác'
    : 'WASD / MŨI TÊN — di chuyển  |  E / SPACE — tương tác';
}

/* ═══════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════ */
window.addEventListener('resize', ()=>{
  initCanvas();
  if(currentScene) buildMap(currentScene);
  checkMobile();
});

/* ═══════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════ */
function startGame() {
  state={day:1,trust:0,health:100,chapter:1,flags:{}};
  pendingCombat=null;
  mapState.mapReady=false;
  mapState.frame=0;
  mapState.pulseT=0;
  document.getElementById('ending-overlay').classList.remove('show');
  document.getElementById('combat-overlay').classList.remove('active');
  updateStatus();
  initCanvas();
  checkMobile();
  cancelAnimationFrame(animId);
  gameLoop();
  goToScene('intro');
}

window.addEventListener('DOMContentLoaded', startGame);
</script>
